<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Company Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #topbar {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      width: 220px;
    }

    #topbar input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
      padding: 8px;
      font-size: 14px;
    }

    #topbar button {
      padding: 8px 10px;
      margin-right: 4px;
      margin-top: 4px;
      cursor: pointer;
    }

    #authStatus {
      font-size: 13px;
      margin-bottom: 8px;
      color: #333;
    }

    .hidden {
      display: none !important;
    }

    /* 보호 콘텐츠는 처음엔 숨김 */
    .ssc-only,
    .admin-only {
      display: none;
    }

    @media (max-width: 768px) {
      #topbar {
        position: static;
        width: auto;
        margin: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">문서를 불러오는 중...</div>

  <div id="topbar">
    <div id="authStatus">로그아웃 상태</div>

    <div id="loginForm">
      <input id="loginId" placeholder="ID">
      <input id="password" type="password" placeholder="비밀번호">
      <button id="loginBtn">로그인</button>
    </div>

    <div id="userActions" class="hidden">
      <button id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <script>
    window.$docsify = {
      name: 'Company Docs',
      loadSidebar: true,
      auto2top: true,
      search: {
        placeholder: '검색',
        noData: '검색 결과 없음',
        depth: 3
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script>
    // -----------------------------
    // 1. 계정 정보
    // ID는 admin / ssc / junior
    // 비밀번호는 평문 대신 SHA-256 해시값 저장
    // -----------------------------
    const accounts = {
      admin: {
        role: "admin",
        // 비밀번호 예시: admin1234
        passwordHash: "AC9689E2272427085E35B9D3E3E8BED88CB3434828B43B86FC0596CAD4C6E270"
      },
      ssc: {
        role: "ssc",
        // 비밀번호 예시: ssc1234
        passwordHash: "DBB36BE05CC80FA0140C0B623952DBBD0B7364B4335F76179C94F39EC1DD48B1"
      },
      junior: {
        role: "junior",
        // 비밀번호 예시: 1234
        passwordHash: "03AC674216F3E15C761EE1A5E255F067953623C8B388B4459E13F978D7C846F4"
      }
    };

    // role 위조를 조금 귀찮게 만드는 용도
    const roleSecrets = {
      admin: "A1x9-admin-key",
      ssc: "B7k2-ssc-key",
      junior: "C3m8-junior-key"
    };

    // -----------------------------
    // 2. SHA-256 함수
    // -----------------------------
    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    // -----------------------------
    // 3. 세션 토큰 생성/검증
    // -----------------------------
    async function makeRoleToken(role, loginId) {
      return await sha256(`${loginId}|${role}|${roleSecrets[role]}`);
    }

    async function saveSession(loginId, role) {
      const token = await makeRoleToken(role, loginId);
      sessionStorage.setItem("loginId", loginId);
      sessionStorage.setItem("role", role);
      sessionStorage.setItem("roleToken", token);
    }

    async function verifySession() {
      const loginId = sessionStorage.getItem("loginId");
      const role = sessionStorage.getItem("role");
      const roleToken = sessionStorage.getItem("roleToken");

      if (!loginId || !role || !roleToken) return false;
      if (!roleSecrets[role]) return false;

      const expected = await makeRoleToken(role, loginId);
      return expected === roleToken;
    }

    function clearSession() {
      sessionStorage.removeItem("loginId");
      sessionStorage.removeItem("role");
      sessionStorage.removeItem("roleToken");
    }

    // -----------------------------
    // 4. 표시용 이름
    // -----------------------------
    function getRoleLabel(role) {
      if (role === "admin") return "admin";
      if (role === "ssc") return "SSC";
      return "주니어 해설사";
    }

    // -----------------------------
    // 5. 로그인 처리
    // -----------------------------
    async function loginUser(loginId, password) {
      const account = accounts[loginId];
      if (!account) return false;

      const inputHash = await sha256(password);
      if (inputHash !== account.passwordHash) return false;

      await saveSession(loginId, account.role);
      return true;
    }

    // -----------------------------
    // 6. 권한별 콘텐츠 표시
    // -----------------------------
    function applyContentByRole(role) {
      document.querySelectorAll(".ssc-only").forEach(el => {
        if (role === "ssc" || role === "admin") {
          el.style.display = "";
        } else {
          el.style.display = "none";
        }
      });

      document.querySelectorAll(".admin-only").forEach(el => {
        if (role === "admin") {
          el.style.display = "";
        } else {
          el.style.display = "none";
        }
      });
    }

    // -----------------------------
    // 7. 권한별 메뉴 표시
    // 문서 경로에 따라 숨김
    // -----------------------------
    function applyMenuByRole(role) {
      const links = document.querySelectorAll('.sidebar a');

      links.forEach(link => {
        const href = link.getAttribute('href');
        if (!href || !link.parentElement) return;

        link.parentElement.style.display = "";

        if (href.includes('/admin/') && role !== 'admin') {
          link.parentElement.style.display = 'none';
        }

        if (href.includes('/ssc/') && !(role === 'ssc' || role === 'admin')) {
          link.parentElement.style.display = 'none';
        }
      });
    }

    // -----------------------------
    // 8. 직접 URL 접근 차단
    // -----------------------------
    function protectPage(role) {
      const path = location.hash || "";

      if (path.includes('/admin/') && role !== 'admin') {
        alert("접근 권한이 없습니다.");
        location.href = "#/";
      }

      if (path.includes('/ssc/') && !(role === 'ssc' || role === 'admin')) {
        alert("접근 권한이 없습니다.");
        location.href = "#/";
      }
    }

    // -----------------------------
    // 9. 로그인 상태 UI 갱신
    // -----------------------------
    async function updateAuthUI() {
      const authStatus = document.getElementById("authStatus");
      const loginForm = document.getElementById("loginForm");
      const userActions = document.getElementById("userActions");

      const valid = await verifySession();

      if (!valid) {
        clearSession();
        authStatus.textContent = "로그아웃 상태";
        loginForm.classList.remove("hidden");
        userActions.classList.add("hidden");
        applyContentByRole("none");
        applyMenuByRole("none");
        return;
      }

      const role = sessionStorage.getItem("role");
      authStatus.textContent = `로그인: ${getRoleLabel(role)}`;
      loginForm.classList.add("hidden");
      userActions.classList.remove("hidden");

      applyContentByRole(role);
      applyMenuByRole(role);
      protectPage(role);
    }

    // -----------------------------
    // 10. 이벤트 연결
    // -----------------------------
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const loginId = document.getElementById("loginId").value.trim();
      const password = document.getElementById("password").value;

      const ok = await loginUser(loginId, password);

      if (!ok) {
        alert("ID 또는 비밀번호를 확인해주세요.");
        return;
      }

      await updateAuthUI();
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      clearSession();
      await updateAuthUI();
    });

    window.addEventListener("load", async () => {
      await updateAuthUI();
    });

    window.addEventListener("hashchange", async () => {
      setTimeout(async () => {
        await updateAuthUI();
      }, 200);
    });
  </script>
</body>
</html>
