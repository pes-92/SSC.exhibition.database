<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Company Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #topbar {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      width: 220px;
    }

    #topbar input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
      padding: 8px;
      font-size: 14px;
    }

    #topbar button {
      padding: 8px 10px;
      margin-right: 4px;
      margin-top: 4px;
      cursor: pointer;
    }

    #authStatus {
      font-size: 13px;
      margin-bottom: 8px;
      color: #333;
    }

    .hidden {
      display: none !important;
    }

    /* 권한별 콘텐츠 기본 숨김 */
    .logged-out-only,
    .volunteer,
    .ssc-only,
    .admin-only {
      display: none;
    }

    /* 검색창은 기본 숨김: ssc/admin만 표시 */
    .search {
      display: none;
    }

    /* 콜아웃 */
    .callout {
      border-left: 4px solid #4a90e2;
      background: #f7fbff;
      padding: 12px 14px;
      margin: 16px 0;
      border-radius: 6px;
    }

    .callout-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .callout img {
      margin-top: 10px;
      border-radius: 6px;
      max-width: 100%;
      height: auto;
    }

    /* 공통 네비게이션 버튼 */
    .page-nav {
      margin: 24px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav-btn {
      padding: 8px 12px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .nav-btn:hover {
      background: #eee;
    }

    /* 태그 */
    .tag-list {
      margin: 16px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      background: #f2f4f7;
      border: 1px solid #d0d7de;
      border-radius: 999px;
      text-decoration: none;
      color: #333;
      font-size: 13px;
    }

    .tag:hover {
      background: #e8eefc;
    }

    @media (max-width: 768px) {
      #topbar {
        position: static;
        width: auto;
        margin: 10px;
      }
    }
    .sidebar {
  display: flex;
  flex-direction: column;
}

.sidebar h1 {
  order: 1;
}

.sidebar .search {
  order: 2;
  margin-top: 8px;
}

.sidebar .sidebar-nav {
  order: 3;
}

.sidebar .search input {
  border-radius: 6px;
  border: 1px solid #ddd;
}
  </style>

</head>
<body>
  <div id="app">문서를 불러오는 중...</div>

  <div id="topbar">
    <div id="authStatus">로그아웃 상태</div>

    <div id="loginForm">
      <input id="loginId" placeholder="ID">
      <input id="password" type="password" placeholder="비밀번호">
      <button id="loginBtn">로그인</button>
    </div>

    <div id="userActions" class="hidden">
      <button id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <script>
    window.$docsify = {
      name: 'SeoulScienceCenter Wiki',
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      auto2top: true,
      search: {
        placeholder: '검색',
        noData: '검색 결과 없음',
        depth: 3
      },
      plugins: [
        function (hook, vm) {
          hook.doneEach(function () {
            setTimeout(async () => {
              await updateAuthUI();
            }, 200);
          });
        }
      ]
    };

    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$']]
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script>
    // -----------------------------
    // 1. 계정 정보
    // 비밀번호 해시는 현재 값 그대로 유지
    // -----------------------------
    const accounts = {
      admin: {
        role: "admin",
        passwordHash: "90c2d458166e98726aa2e58227ad996e5f1f5deeeeeec77db5fb7e1308c4d2ed"
      },
      ssc: {
        role: "ssc",
        passwordHash: "4225466f46976e5877d0c8f7a77eafbf97a92841dedabae705816fa4c76e033f"
      },
      junior: {
        role: "junior",
        passwordHash: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"
      }
    };

    const roleSecrets = {
      admin: "A1x9-admin-key",
      ssc: "B7k2-ssc-key",
      junior: "C3m8-junior-key"
    };

    // 전시실 개요 파일명 매핑
    const hallIndexMap = {
      blue: "B-hall",
      orange: "O-hall",
      green: "G-hall"
    };

    // -----------------------------
    // 2. SHA-256 함수
    // -----------------------------
    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    // -----------------------------
    // 3. 세션 토큰 생성/검증
    // -----------------------------
    async function makeRoleToken(role, loginId) {
      return await sha256(`${loginId}|${role}|${roleSecrets[role]}`);
    }

    async function saveSession(loginId, role) {
      const token = await makeRoleToken(role, loginId);
      sessionStorage.setItem("loginId", loginId);
      sessionStorage.setItem("role", role);
      sessionStorage.setItem("roleToken", token);
    }

    async function verifySession() {
      const loginId = sessionStorage.getItem("loginId");
      const role = sessionStorage.getItem("role");
      const roleToken = sessionStorage.getItem("roleToken");

      if (!loginId || !role || !roleToken) return false;
      if (!roleSecrets[role]) return false;

      const expected = await makeRoleToken(role, loginId);
      return expected === roleToken;
    }

    function clearSession() {
      sessionStorage.removeItem("loginId");
      sessionStorage.removeItem("role");
      sessionStorage.removeItem("roleToken");
    }

    // -----------------------------
    // 4. 표시용 이름
    // -----------------------------
    function getRoleLabel(role) {
      if (role === "admin") return "관리자";
      if (role === "ssc") return "해설사";
      if (role === "junior") return "자원봉사자";
      return "로그아웃";
    }

    // -----------------------------
    // 5. 로그인 처리
    // -----------------------------
    async function loginUser(loginId, password) {
      const account = accounts[loginId];
      if (!account) return false;

      const inputHash = await sha256(password);
      if (inputHash !== account.passwordHash) return false;

      await saveSession(loginId, account.role);
      return true;
    }

    // -----------------------------
    // 6. 권한별 콘텐츠 표시
    // -----------------------------
    function applyContentByRole(role) {
      document.querySelectorAll(".logged-out-only").forEach(el => {
        el.style.display = (!role || role === "none") ? "block" : "none";
      });

      document.querySelectorAll(".volunteer").forEach(el => {
        el.style.display = (role === "junior" || role === "ssc" || role === "admin") ? "block" : "none";
      });

      document.querySelectorAll(".ssc-only").forEach(el => {
        el.style.display = (role === "ssc" || role === "admin") ? "block" : "none";
      });

      document.querySelectorAll(".admin-only").forEach(el => {
        el.style.display = (role === "admin") ? "block" : "none";
      });
    }

    // -----------------------------
    // 7. 권한별 메뉴 표시
    // -----------------------------
    function applyMenuByRole(role) {
      const links = document.querySelectorAll(".sidebar a");

      links.forEach(link => {
        const href = link.getAttribute("href");
        const item = link.parentElement;
        if (!href || !item) return;

        item.style.display = "";

        if (href.includes("admin/") && role !== "admin") {
          item.style.display = "none";
        }

        if (href.includes("ssc/") && !(role === "ssc" || role === "admin")) {
          item.style.display = "none";
        }
      });
    }

    // -----------------------------
    // 8. 직접 URL 접근 차단
    // -----------------------------
    function protectPage(role) {
      const path = location.hash || "";

      if (path.includes("admin/") && role !== "admin") {
        alert("접근 권한이 없습니다.");
        location.href = "#/";
        return;
      }

      if (path.includes("ssc/") && !(role === "ssc" || role === "admin")) {
        alert("접근 권한이 없습니다.");
        location.href = "#/";
      }
    }

    // -----------------------------
    // 9. 검색창 표시 제어
    // junior와 로그아웃은 숨김
    // -----------------------------

    function toggleSearchByRole(role) {
    const searchBox = document.querySelector(".search");
    if (!searchBox) return;

    if (role === "ssc" || role === "admin") {
      searchBox.style.setProperty("display", "block", "important");
    } else {
    searchBox.style.setProperty("display", "none", "important");
    }
    }

    // -----------------------------
    // 10. 로그인 상태 UI 갱신
    // -----------------------------
    async function updateAuthUI() {
      const authStatus = document.getElementById("authStatus");
      const loginForm = document.getElementById("loginForm");
      const userActions = document.getElementById("userActions");

      const valid = await verifySession();

      if (!valid) {
        clearSession();
        authStatus.textContent = "로그아웃 상태";
        loginForm.classList.remove("hidden");
        userActions.classList.add("hidden");

        applyContentByRole("none");
        applyMenuByRole("none");
        protectPage("none");
        toggleSearchByRole("none");
        return;
      }

      const role = sessionStorage.getItem("role");
      authStatus.textContent = `로그인: ${getRoleLabel(role)}`;
      loginForm.classList.add("hidden");
      userActions.classList.remove("hidden");

      applyContentByRole(role);
      applyMenuByRole(role);
      toggleSearchByRole(role);
      protectPage(role);
    }

    // -----------------------------
    // 11. 이벤트 연결
    // -----------------------------
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const loginId = document.getElementById("loginId").value.trim();
      const password = document.getElementById("password").value;

      const ok = await loginUser(loginId, password);

      if (!ok) {
        alert("ID 또는 비밀번호를 확인해주세요.");
        return;
      }

      await updateAuthUI();
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      clearSession();
      await updateAuthUI();
    });

    window.addEventListener("load", async () => {
      await updateAuthUI();
    });

    window.addEventListener("hashchange", async () => {
      setTimeout(async () => {
        await updateAuthUI();
      }, 100);
    });

    // -----------------------------
    // 12. 공통 네비게이션 함수
    // -----------------------------
    function goHome() {
      location.hash = "#/";
    }

    function goHall(hall) {
      const page = hallIndexMap[hall];
      if (!page) return;
      location.hash = `#/docs/halls/${hall}/${page}`;
    }

    function goBack() {
      history.back();
    }

    function goCurrentHall() {
      const match = location.hash.match(/docs\/halls\/([^\/]+)/);
      if (!match) return;

      const hall = match[1];
      const page = hallIndexMap[hall];
      if (!page) return;

      location.hash = `#/docs/halls/${hall}/${page}`;
    }
  </script>
</body>
</html>
